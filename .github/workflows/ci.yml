name: CI Checks

on:
  pull_request:
    branches: [ "main" ]

jobs:
  preflight-ml:
    name: Preflight ML Check
    runs-on: ubuntu-latest
    continue-on-error: true # Ensures this check isn't critical
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Run pre-flight checks
        uses: Rusheel86/preflight@v0.1.1
        with:
          # Update this path to point to your actual dataloader file if different
          dataloader: data/loaders/tng_loader.py

  basic-checks:
    name: Basic Checks (Lint & Test)
    runs-on: ubuntu-latest
    continue-on-error: true # Ensures this check isn't critical
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install flake8 pytest

      - name: Lint with flake8
        continue-on-error: true # Sub-step safety
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      - name: Test with pytest
        continue-on-error: true # Sub-step safety
        run: |
          pytest
