api:
  host: 0.0.0.0
  port: 8000
data:
  batch_size: 16
  grouping: fof
  num_workers: 2
  source: tng
  test_ratio: 0.15
  tng:
    cache_dir: data/raw/tng_cache
    clustered_file: data/raw/tng100_clustered.csv
    min_subhalos_per_halo: 3
    n_halos: 500
    snapshot: 99
  train_ratio: 0.7
  val_ratio: 0.15
explain:
  gnnexplainer:
    epochs: 200
    lr: 0.01
    num_hops: 3
  method: pgexplainer
  output_dir: outputs/explanations
  pgexplainer:
    epochs: 30
    lr: 0.003
    num_hops: 3
graph:
  edge_features:
  - distance
  - delta_v
  - cos_theta
  - mass_ratio
  - proj_sep
  hierarchical: false
  k_neighbors: 8
  method: radius
  radius_mpc: 2.0
  self_loops: true
logging:
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  level: INFO
  log_file: outputs/logs/cosmic_net.log
model:
  activation: leaky_relu
  dropout: 0.04
  edge_features: 5
  hidden_dim: 256
  mc_dropout: true
  mc_samples: 30
  node_features: 4
  num_layers: 3
  output_dim: 128
  pooling: mean
  residual: true
physics:
  G: 4.302e-09
  use_virial_loss: true
  virial_coefficient: 2.0
seed: 42
symbolic:
  embedding_point: pre_pooling
  enforce_dimensional_consistency: true
  library: pysr
  output_dir: outputs/equations
  pysr:
    binary_operators:
    - +
    - '-'
    - '*'
    - /
    maxsize: 20
    niterations: 100
    populations: 30
    unary_operators:
    - log
    - sqrt
    - square
    - cube
training:
  batch_size: 16
  checkpoint_dir: outputs/checkpoints
  early_stopping_patience: 60
  epochs: 300
  grad_clip: 1.0
  lambda_end: 0.05
  lambda_epochs: 200
  lambda_schedule: cosine
  lambda_start: 0.0
  learning_rate: 0.0008
  lr_scheduler: cosine
  lr_scheduler_settings:
    T_max: 300
    eta_min: 1.0e-06
  optimizer: adamw
  save_best: true
  save_every: 25
  test_source: tng
  train_source: tng
  virial_grad_clip: 1.0
  weight_decay: 5.0e-05
wandb:
  enabled: false
